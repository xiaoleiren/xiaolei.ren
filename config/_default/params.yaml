# SITE SETUP
# Guide: https://docs.hugoblox.com/tutorial/
# Documentation: https://docs.hugoblox.com/

# Appearance
appearance:
  mode: system
  color: blue

defaultContentLanguage: en
defaultContentLanguageInSubdir: false
plugins_css: ["custom"]

# SEO
marketing:
  seo:
    site_type: Person
    local_business_type: ''
    org_name: 'Macau University of Science and Technology'
    description: 'Xiaolei Ren is an Assistant Professor at MUST. His research covers software security, binary code analysis, compiler optimization, and trustworthy AI systems.'
    twitter: ''
  analytics:
    google_analytics: ''
    baidu_tongji: ''
    plausible: ''
    fathom: ''
    pirsch: ''
  verification:
    google: ''
    baidu: ''

# Site header
header:
  navbar:
    enable: true
    blox: "navbar"
    fixed_to_top: true
    show_search: true
    show_theme_chooser: true
    logo:
      text: "Xiaolei Ren"

# Site footer
footer:
  copyright:
    notice: '© {year} Xiaolei Ren. This work is licensed under {license}'
    license:
      enable: true
      allow_derivatives: false
      share_alike: false
      allow_commercial: false

# Localization
locale:
  date_format: 'Jan 2, 2006'
  time_format: '3:04 PM'

# Site features
features:
  favicon: true
  math:
    enable: false
  privacy_pack:
    enable: false
